spring:
  application:
    name: eureka-server
  config:
    import: "configserver:http://config-server:8888"
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 3000
        multiplier: 1.5

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
