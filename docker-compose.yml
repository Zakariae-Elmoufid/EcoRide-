version: '3.8'

services:

  # ─── Zipkin ───────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - ev-network

  # ─── Prometheus ───────────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ev-network

  # ─── Grafana ──────────────────────────────────────
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ev-network

  # ─── Zookeeper (required by Kafka) ────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ev-network

  # ─── Kafka ────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ev-network

  # ─── Bookings PostgreSQL ──────────────────────────
  bookings-db:
    image: postgres:15-alpine
    container_name: bookings-db
    environment:
      POSTGRES_DB: bookings_db
      POSTGRES_USER: bookings_user
      POSTGRES_PASSWORD: bookings_pass
    ports:
      - "5435:5432"
    volumes:
      - bookings-db-data:/var/lib/postgresql/data
    networks:
      - ev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookings_user -d bookings_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Booking Service ──────────────────────────────
  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      - BOOKINGS_DB_USER=bookings_user
      - BOOKINGS_DB_PASS=bookings_pass
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      bookings-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ev-network
    restart: on-failure

networks:
  ev-network:
    driver: bridge

volumes:
  grafana-data:
  bookings-db-data:
