version: '3.8'

services:
  # PostgreSQL Database pour Ride Service
  postgres-ride:
    image: postgres:16-alpine
    container_name: postgres-ride-service
    environment:
      POSTGRES_DB: ride_db
      POSTGRES_USER: ride_user
      POSTGRES_PASSWORD: ride_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-ride-data:/var/lib/postgresql/data
    networks:
      - ride-network
    restart: unless-stopped

  # pgAdmin pour gérer la base de données
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-ride-service
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecoride.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - ride-network
    depends_on:
      - postgres-ride
    restart: unless-stopped

volumes:
  postgres-ride-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  ride-network:
    driver: bridge

