server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/ev-carpooling
  datasource:
    url: jdbc:postgresql://users-db:5432/users_db
    username: users_user
    password: users_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true



eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka


custom:
  max-score: 5.0